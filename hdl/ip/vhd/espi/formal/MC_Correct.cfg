\* TLC configuration: Correct parameterization with CDC.
\* Expected: P1 (NoStaleData), P2 (NoDroppedBytes) PASS.
\*           P3 (NoPayloadUnderflow) may FAIL under CDC_LAG > 0
\*           because tx_rusedwds can under-report, causing a zero-length latch.

SPECIFICATION SpecCompliant

CONSTANTS
    FIFO_DEPTH = 3
    MAX_MSG_SIZE = 2
    HOLD_THRESH = 2
    MAX_PAYLOAD = 2
    CDC_LAG = 1
    EXTRA_LAG = 0
    HDR_CYCLES = 1
    DataVal = {1, 2}

INVARIANT TypeOK
INVARIANT FifoDepthBound
INVARIANT StaleCounterBound
INVARIANT NoStaleData
INVARIANT NoDroppedBytes
INVARIANT NoPayloadUnderflow

PROPERTY DrainCompletes
